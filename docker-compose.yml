services:
  gasclaw:
    build: .
    container_name: gasclaw
    ports:
      - "18789:18789"
    volumes:
      - ./project:/project
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "gasclaw", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
